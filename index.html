<!DOCTYPE html>
<html>
<head>
  <title>Пример подключения плеера 1</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <style>
    .player-container {
      width: 800px;
      height: 600px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 1.9);
      display: flex;
      flex-direction: column;
    }
    .video-wrapper {
      flex-grow: 1;
    }
    .controls {
      background-color: black;
    }
    .button-group {
      display: flex;
      align-items: centert;
      justify-content: left;
      padding: 8px;
    }
    .control-button {
      border: none;
      cursor: pointer;
      color: white;
      background-color: transparent;
      font-size: 16px;
      padding: 8px 12px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="player" class="player-container">
    <div class="js-video-container video-wrapper"></div>
    <div class="controls">
      <div class="button-group">
        <button class="control-button js-play-button">
           <span class="fa fa-play"></span>
        </button>
        <button class="control-button js-pause-button">
          <span class="fa fa-pause"></span>
        </button>
        <button class="control-button js-volume-button" hidden>
          <span class="fa fa-volume-off"></span>
        </button>
        <button class="control-button js-mute-button">
          <span class="fa fa-volume-up"></span>
        </button>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>  
  <script type="text/javascript">
    createPlayer({elementId: 'player'});
  </script>
</body>
</html>
